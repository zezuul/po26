services:
  server:
    build: ./server
    ports:
      - "3011:3011"
    environment:
      PORT: 3011
      CORS_ORIGIN: http://localhost:3010

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:3011
    ports:
      - "3010:3010"
    depends_on:
      - server
