name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'go', 'java-kotlin']
        include:
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: java-kotlin
            build-mode: autobuild

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version: '1.22'

      - uses: actions/setup-java@v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Kotlin (zadanie3)
        if: matrix.language == 'java-kotlin'
        working-directory: zadanie3
        run: gradle build -x test

      - name: Autobuild Go
        if: matrix.language == 'go'
        working-directory: zadanie4
        run: go build -o /dev/null .

      - name: Autobuild
        if: matrix.build-mode == 'autobuild' && matrix.language != 'go' && matrix.language != 'java-kotlin'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
