name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  javascript:
    name: ESLint (zadanie5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            zadanie5/client/package-lock.json
            zadanie5/server/package-lock.json

      - name: Install client
        run: npm ci
        working-directory: zadanie5/client

      - name: Install server
        run: npm ci
        working-directory: zadanie5/server

      - name: ESLint client
        run: npm run lint
        working-directory: zadanie5/client

      - name: ESLint server
        run: npm run lint
        working-directory: zadanie5/server

  go:
    name: Go vet (zadanie4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        working-directory: zadanie4
        run: go vet ./...

      - name: Build
        working-directory: zadanie4
        run: go build -o /dev/null .

  kotlin:
    name: Kotlin build (zadanie3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build
        working-directory: zadanie3
        run: gradle build -x test
